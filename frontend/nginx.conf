server {
    listen 12001;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all backend routes to the backend container
    location ~ ^/(api|execute-pipeline-from-file|execute-pipeline-from-db|create-pipeline-tracker|pipeline-progress-stream|pipeline-progress|configure-db-source-pipeline|configure-preembedded-pipeline|execute-preembedded-pipeline|unified-search|generate-summary|generate-summary-stream|export-config|import-config|list-configs|get-source-db-columns|cancel-pipeline|reload-indexes|health) {
        proxy_pass http://backend:12000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';

        # Required for SSE (Server-Sent Events) streaming
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
    }

    # React SPA — serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
